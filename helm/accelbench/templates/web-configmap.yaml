apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "accelbench.fullname" . }}-nginx
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Cognito JWT cookies (id + access + refresh) accumulate past
        # nginx's 4k/8k default header buffers, producing "400 Bad Request
        # Request Header Or Cookie Too Large" once a session has been
        # active for a while. 16k held for standard pools; federated
        # claims push higher. 32k gives durable headroom.
        proxy_buffer_size           32k;
        proxy_buffers               8 32k;
        large_client_header_buffers 4 32k;

        # API requests proxy to backend
        location /api/ {
            proxy_pass http://{{ include "accelbench.fullname" . }}-api:{{ .Values.api.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
