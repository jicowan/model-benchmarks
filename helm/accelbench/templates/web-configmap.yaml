apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "accelbench.fullname" . }}-nginx
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Cognito JWT cookies (id + access + refresh) routinely push the
        # response header block above nginx's 4k default, causing 502s on
        # login responses. The request direction carries all three cookies
        # back on every subsequent call, so we bump the client header
        # buffers too. Observed ~5-8k on standard Cognito pools; custom
        # attributes or federated IdP claims push higher. 16k gives
        # comfortable headroom.
        proxy_buffer_size           16k;
        proxy_buffers               8 16k;
        large_client_header_buffers 4 16k;

        # API requests proxy to backend
        location /api/ {
            proxy_pass http://{{ include "accelbench.fullname" . }}-api:{{ .Values.api.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
