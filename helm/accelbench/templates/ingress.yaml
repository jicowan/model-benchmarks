{{- if .Values.ingress.enabled }}
{{- $tlsSource := .Values.ingress.tls.source | default "none" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "accelbench.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    {{- if ne $tlsSource "none" }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: {{ required "ingress.tls.certificateArn is required when ingress.tls.source is acm-route53 or acm-existing" .Values.ingress.tls.certificateArn | quote }}
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    {{- else }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    {{- end }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ required "ingress.host is required when ingress.enabled=true" .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "accelbench.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "accelbench.fullname" . }}-web
                port:
                  number: {{ .Values.web.port }}
{{- end }}
