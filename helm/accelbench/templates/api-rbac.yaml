{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "accelbench.fullname" . }}-orchestrator
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
rules:
  # Manage benchmark workload namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  # Manage model deployments and services
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  # Manage configmaps for inference-perf configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
  # Manage loadgen jobs
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  # Read pod status and logs for metric collection
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # PRD-47: scrape kubelet /stats/summary via the apiserver proxy to
  # capture peak container workingSetBytes during model load. Fuels
  # per-family host-memory calibration in the recommender.
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
  # PRD-33: Capacity Reservations card patches Karpenter CRDs to attach
  # ODCRs/CBRs to the GPU + Neuron EC2NodeClasses and keep the NodePools'
  # capacity-type requirement including 'reserved'.
  - apiGroups: ["karpenter.k8s.aws"]
    resources: ["ec2nodeclasses"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "accelbench.fullname" . }}-orchestrator
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "accelbench.fullname" . }}-orchestrator
subjects:
  - kind: ServiceAccount
    name: {{ include "accelbench.api.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
