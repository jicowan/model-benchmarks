{{- if .Values.rbac.create }}
# ClusterRole — only the resources that are genuinely cluster-scoped.
# Namespaced workload permissions moved to the Role below so a compromised
# API pod can't create workloads in kube-system or tenant namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "accelbench.fullname" . }}-orchestrator
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
rules:
  # PRD-47: scrape kubelet /stats/summary via the apiserver proxy to
  # capture peak container workingSetBytes during model load. Fuels
  # per-family host-memory calibration in the recommender.
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
  # PRD-33: Capacity Reservations card patches Karpenter CRDs to attach
  # ODCRs/CBRs to the GPU + Neuron EC2NodeClasses and keep the NodePools'
  # capacity-type requirement including 'reserved'.
  - apiGroups: ["karpenter.k8s.aws"]
    resources: ["ec2nodeclasses"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "accelbench.fullname" . }}-orchestrator
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "accelbench.fullname" . }}-orchestrator
subjects:
  - kind: ServiceAccount
    name: {{ include "accelbench.api.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
---
# Role — all benchmark workloads live in the accelbench namespace, so the
# orchestrator's workload CRUD is confined there via this Role. Drop the
# namespaces verbs entirely: the namespace is pre-created by Helm.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "accelbench.fullname" . }}-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "accelbench.fullname" . }}-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "accelbench.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "accelbench.fullname" . }}-orchestrator
subjects:
  - kind: ServiceAccount
    name: {{ include "accelbench.api.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
