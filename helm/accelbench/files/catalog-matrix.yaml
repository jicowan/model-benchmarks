# AccelBench Catalog Matrix
# Defines which model x instance type combinations to benchmark.
# The seed script iterates over this matrix and calls /api/v1/recommend to get
# optimal configuration, then submits the run via POST /api/v1/runs.

defaults:
  framework_version: "v0.7.3"
  dataset_name: "sharegpt"

# Models to benchmark. Parameter count is fetched from HuggingFace.
models:
  - hf_id: "meta-llama/Llama-3.1-8B-Instruct"
    family: llama

  - hf_id: "meta-llama/Llama-3.1-70B-Instruct"
    family: llama

  - hf_id: "meta-llama/Llama-3.3-70B-Instruct"
    family: llama

  - hf_id: "mistralai/Mistral-7B-Instruct-v0.3"
    family: mistral

  - hf_id: "mistralai/Mixtral-8x7B-Instruct-v0.1"
    family: mistral

  - hf_id: "Qwen/Qwen2.5-7B-Instruct"
    family: qwen

  - hf_id: "Qwen/Qwen2.5-72B-Instruct"
    family: qwen

  - hf_id: "google/gemma-2-9b-it"
    family: gemma

  - hf_id: "google/gemma-2-27b-it"
    family: gemma

  - hf_id: "deepseek-ai/DeepSeek-R1-Distill-Llama-8B"
    family: deepseek

  - hf_id: "deepseek-ai/DeepSeek-R1-Distill-Llama-70B"
    family: deepseek

  - hf_id: "microsoft/Phi-4"
    family: phi

# Instance types to benchmark. Configuration (TP, quantization, concurrency, etc.)
# is determined automatically by the recommendation engine based on model metadata.
instance_types:
  # GPU instances
  - g5.xlarge
  - g5.2xlarge
  - g5.48xlarge
  - g6.xlarge
  - g6e.xlarge
  - g6e.2xlarge
  - g6e.48xlarge
  - p4d.24xlarge
  - p5.48xlarge
  - p5e.48xlarge

  # Neuron instances (disabled - compilation takes 30-60+ min and requires significant host RAM)
  # - inf2.xlarge
  # - inf2.8xlarge
  # - inf2.24xlarge
  # - inf2.48xlarge
  # - trn1.2xlarge
  # - trn1.32xlarge
  # - trn2.48xlarge
