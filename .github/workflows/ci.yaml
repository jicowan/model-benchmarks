name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  file-sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check scripts and Helm files are in sync
        run: |
          # Files that must be synchronized between scripts/ and helm/accelbench/files/
          FILES_TO_CHECK=(
            "catalog-matrix.yaml"
            "seed-catalog.sh"
          )

          SYNC_ERROR=0
          for file in "${FILES_TO_CHECK[@]}"; do
            SCRIPTS_FILE="scripts/$file"
            HELM_FILE="helm/accelbench/files/$file"

            if [[ ! -f "$SCRIPTS_FILE" ]]; then
              echo "ERROR: $SCRIPTS_FILE does not exist"
              SYNC_ERROR=1
              continue
            fi

            if [[ ! -f "$HELM_FILE" ]]; then
              echo "ERROR: $HELM_FILE does not exist"
              SYNC_ERROR=1
              continue
            fi

            if ! diff -q "$SCRIPTS_FILE" "$HELM_FILE" >/dev/null 2>&1; then
              echo "ERROR: $SCRIPTS_FILE and $HELM_FILE are out of sync"
              diff "$SCRIPTS_FILE" "$HELM_FILE" || true
              SYNC_ERROR=1
            else
              echo "OK: $file is in sync"
            fi
          done

          if [[ $SYNC_ERROR -ne 0 ]]; then
            echo ""
            echo "Files are out of sync. To fix, run:"
            echo "  cp scripts/catalog-matrix.yaml helm/accelbench/files/"
            echo "  cp scripts/seed-catalog.sh helm/accelbench/files/"
            exit 1
          fi

          echo ""
          echo "All files are in sync."
