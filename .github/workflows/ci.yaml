name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: this workflow only builds and tests; it doesn't push,
# comment, upload artifacts, or otherwise mutate the repo. Explicit read
# scope overrides the (often more permissive) default token permissions.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
