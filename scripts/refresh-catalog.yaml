apiVersion: batch/v1
kind: CronJob
metadata:
  name: accelbench-catalog-refresh
  namespace: accelbench
  labels:
    app.kubernetes.io/name: accelbench
    app.kubernetes.io/component: catalog-refresh
spec:
  schedule: "0 2 * * 0"  # Weekly: Sunday at 02:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: accelbench
            app.kubernetes.io/component: catalog-refresh
        spec:
          restartPolicy: Never
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: accelbench/node-type
                        operator: In
                        values:
                          - system
          containers:
            - name: trigger
              image: curlimages/curl:8.11.0
              # PRD-30: the seeder is now an in-process goroutine inside the
              # API server. This CronJob just nudges the endpoint; the API
              # reads the matrix from the DB and uses the platform HF token
              # (PRD-31) for gated models.
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  curl -sfX POST \
                    "http://accelbench-api.accelbench.svc.cluster.local:8080/api/v1/catalog/seed" \
                    -o /dev/null -w 'HTTP %{http_code}\n'
              resources:
                requests:
                  cpu: "50m"
                  memory: "32Mi"
                limits:
                  cpu: "200m"
                  memory: "64Mi"
